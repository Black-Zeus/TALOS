services:
  php:
    image: php:8.2-apache
    container_name: talos_php
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      TALOS_APP_ROOT_URL: ${TALOS_APP_ROOT_URL}
      MYSQL_HOST: mysql
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${TALOS_HTTP_PORT:-8084}:80"
    volumes:
      - ./volumes/php:/var/www/html
    networks:
      - talos_net
    depends_on:
      mysql:
        condition: service_healthy
    mem_limit: ${PHP_MEM_LIMIT:-512m}
    cpus: ${PHP_CPUS:-1.0}
    pids_limit: ${PHP_PIDS_LIMIT:-128}

  mysql:
    image: mysql:8.4
    container_name: talos_mysql
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_EXTERNAL_PORT:-3308}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - talos_net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    mem_limit: ${MYSQL_MEM_LIMIT:-1g}
    cpus: ${MYSQL_CPUS:-1.0}
    pids_limit: ${MYSQL_PIDS_LIMIT:-256}

networks:
  talos_net:
    external: true
    name: talos_default

volumes:
  mysql_data:
    name: talos_mysql_data
